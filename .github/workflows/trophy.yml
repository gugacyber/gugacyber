name: Generate Trophy Graph

on:
  schedule:
    - cron: "0 0 * * *"   # roda todo dia à meia-noite
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Generate trophy SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: gugacyber
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          output_action: branch
          output_condition: always
          filename: trophy.svg
          committer_branch: trophy-output
          committer_message: "chore: update trophy graph"
